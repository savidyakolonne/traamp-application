name: traamp_frontend
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.9+9

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  device_preview: ^1.3.1
  crypto: ^3.0.3
  convert: ^3.1.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.2.6
  google_maps_flutter: ^2.10.1
  firebase_storage: ^13.0.6
  image_picker: ^1.1.2
  http: ^1.2.2
  weather: ^3.2.1
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^6.0.0
  file_picker: ^10.3.10
  flutter_native_splash: ^2.4.7
  firebase_app_check: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_native_splash:
  android: true
  ios: true
  web: true
  fullscreen: true
  color: "#F7F8F6"
  image: "assets/images/splash_logo.png"
  android_12:
    color: "#F7F8F6"
    image: "assets/images/splash_logo.png"
    icon_background_color: "#F7F8F6"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    # - .env
